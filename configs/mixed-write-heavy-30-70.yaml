name: mixed-write-heavy-30-70
workload_type: performance
mode: mixed
duration_seconds: 60
concurrency:
  writers: 12
  readers: 4
operations:
  write:
    event_size_bytes: 256
    probability: 0.7  # 70% writes
  read:
    batch_size: 50
    probability: 0.3  # 30% reads
streams:
  distribution: uniform
  count: 10000
setup:
  prepopulate_events: 5000
  prepopulate_streams: 2000
