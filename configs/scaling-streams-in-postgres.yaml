performance:
  name: scaling-writers
  mode: write
  use_docker: false
  warmup_seconds: 0
  duration_seconds: 30
  samples_per_second: 2
  concurrency:
    readers: 0
    writers: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024]
  operations:
    write:
      event_size_bytes: 256
  stores:
    - py-eventsourcing
    - marten
    - umadb
---
performance:
  name: scaling-readers
  mode: read
  use_docker: false
  warmup_seconds: 0
  duration_seconds: 30
  samples_per_second: 2
  concurrency:
    readers: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024]
    writers: 0
  operations:
    write:
      event_size_bytes: 256
    read:
      limit: 10
  setup:
    prepopulate_events: 5000
    prepopulate_streams: 500
  stores:
    - py-eventsourcing
    - marten
    - umadb
