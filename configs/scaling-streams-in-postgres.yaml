performance:
  name: writeflood-stream-unconditional
  mode: writeflood
  duration_seconds: 30
  concurrency:
    writers: [1, 2, 4]
  operations:
    write:
      event_size_bytes: 256
      in_flight_limit: 250
  stores:
    - py-eventsourcing
    - marten
    - umadb
