name: mixed-read-heavy-70-30
workload_type: performance
mode: mixed
duration_seconds: 60
concurrency:
  writers: 4
  readers: 12
operations:
  write:
    event_size_bytes: 256
    probability: 0.3  # 30% writes
  read:
    batch_size: 50
    probability: 0.7  # 70% reads
setup:
  prepopulate_events: 20000
  prepopulate_streams: 5000
