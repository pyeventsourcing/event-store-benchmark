name: scaling-readers
workload_type: performance
mode: read
duration_seconds: 60
concurrency:
  readers: [1, 2, 4, 8, 16, 32]  # Sweep: measure read scalability
operations:
  read:
    batch_size: 100
streams:
  distribution: uniform
  count: 5000
setup:
  prepopulate_events: 50000
  prepopulate_streams: 5000
stores: [umadb, kurrentdb, dummy]
