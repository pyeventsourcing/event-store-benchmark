name: scaling-readers
workload_type: performance
mode: read
duration_seconds: 6
concurrency:
  readers: [1, 2, 4, 8, 16, 32]
operations:
  write:
    event_size_bytes: 256
  read:
    batch_size: 100
setup:
  prepopulate_events: 5000
  prepopulate_streams: 500
stores: [umadb, kurrentdb, axonserver, eventsourcingdb, dummy]
