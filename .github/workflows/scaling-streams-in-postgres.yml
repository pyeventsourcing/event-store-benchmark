name: Scaling Streams in Postgres

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.session.outputs.session_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate Session ID
        id: session
        run: echo "session_id=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build benchmark tool
        run: make build

      - name: Upload benchmark tool
        uses: actions/upload-artifact@v6
        with:
          name: es-bench
          path: target/release/es-bench
          retention-days: 1

      - name: Upload configs
        uses: actions/upload-artifact@v6
        with:
          name: configs
          path: configs/
          retention-days: 1

      - name: Upload Makefile
        uses: actions/upload-artifact@v6
        with:
          name: Makefile
          path: Makefile
          retention-days: 1

  run-scaling-streams-in-postgres:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        store: [postgres-dcb-marten, postgres-dcb-ttcte, umadb]
    env:
      ESB_SESSION_ID: ${{ needs.setup.outputs.session_id }}
      ESB_WORKLOAD_STORES: ${{ matrix.store }}
      ESB_GIT_VERSION: ${{ github.sha }}
    steps:
      - name: Setup database
        if: ${{ matrix.store == 'postgres-dcb-marten' || matrix.store == 'postgres-dcb-ttcte' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib
          sudo mkdir -p /etc/systemd/system/postgresql.service.d
          sudo tee /etc/systemd/system/postgresql.service.d/override.conf >/dev/null <<'EOF'
          [Service]
          CPUAffinity=0 1 2
          EOF
          sudo systemctl daemon-reload
          sudo systemctl restart postgresql
          sudo systemctl status postgresql
          systemctl show postgresql -p CPUAffinity

          pgrep -x postgres | xargs -I{} taskset -cp {}
          
          sudo -u postgres psql -c 'CREATE DATABASE eventsourcing;'
          sudo -u postgres psql -c "CREATE USER eventsourcing WITH PASSWORD 'eventsourcing';"
          sudo -u postgres psql -c "ALTER DATABASE eventsourcing OWNER TO eventsourcing;"
          
          sudo -u postgres psql -tAc "SHOW max_connections;"
          sudo -u postgres psql -tAc "SHOW superuser_reserved_connections;"
          sudo -u postgres psql -tAc "SELECT current_setting('max_connections')::int - current_setting('superuser_reserved_connections')::int AS usable_non_superuser_slots;"

      - name: Download benchmark tool
        uses: actions/download-artifact@v8
        with:
          name: es-bench
          path: target/release/

      - name: Download configs
        uses: actions/download-artifact@v8
        with:
          name: configs
          path: configs/

      - name: Make benchmark tool executable
        run: chmod +x target/release/es-bench

      - name: Download Makefile
        uses: actions/download-artifact@v8
        with:
          name: Makefile
          path: .

      - name: Create tables for Marten
        if: ${{ matrix.store == 'postgres-dcb-marten' }}
        run: |
          pgrep -o -x postgres > $GITHUB_WORKSPACE/postgres-dcb-marten.pid
          ./target/release/es-bench create-marten-tables

      - name: Create tables for PyEventsourcing
        if: ${{ matrix.store == 'postgres-dcb-ttcte' }}
        run: |
          pgrep -o -x postgres > $GITHUB_WORKSPACE/postgres-dcb-ttcte.pid
          ./target/release/es-bench create-postgres-dcb-ttcte-tables

      - name: Install and start UmaDB
        if: ${{ matrix.store == 'umadb' }}
        run: |
          curl -sSL https://github.com/umadb-io/umadb/releases/download/v0.5.4/umadb-x86_64-unknown-linux-gnu.tar.gz -o umadb.tar.gz
          tar -xzf umadb.tar.gz
          chmod +x umadb
          sudo mv umadb /usr/local/bin/umadb
          UMADB_READ_METHOD=fileio UMADB_PAGE_CACHE_MAX_MB=2000 taskset -c 0,1,2 nohup umadb > $GITHUB_WORKSPACE/umadb.log 2>&1 &
          echo $! > $GITHUB_WORKSPACE/umadb.pid
          for i in {1..60}; do
            if nc -z 127.0.0.1 50051; then
              cat $GITHUB_WORKSPACE/umadb.log
              echo "UmaDB is ready after $((i-1)) seconds"
              exit 0
            fi
            sleep 1
          done
          cat $GITHUB_WORKSPACE/umadb.log
          echo "UmaDB failed to start after 60 seconds"
          exit 1

      - name: Run scaling workload
        run: |
          taskset -c 3 make run-scaling-streams-in-postgres

      - name: Upload scaling results
        uses: actions/upload-artifact@v6
        with:
          name: results-scaling-${{ matrix.store }}
          path: results/
          retention-days: 1

  report:
    needs: [setup, run-scaling-streams-in-postgres]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'python/requirements.txt'

      - name: Create Python virtual environment for reporting
        run: make venv

      - name: Download results
        uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: results/
          merge-multiple: true

      - name: Generate report
        run: make report

      - name: Upload report artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-report
          path: results/
