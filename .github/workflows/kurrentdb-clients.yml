name: Benchmark KurrentDB Clients

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  kurrentdb-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib numpy

      - name: Install and start kurrentdb
        run: |
          curl -1sLf 'https://packages.kurrent.io/public/kurrent-lts/setup.deb.sh' | sudo -E bash
          sudo apt-get install kurrentdb=26.0.2
          sudo cat /etc/kurrentdb/kurrentdb.conf
          sudo /usr/bin/kurrentd --insecure > kurrentdb.log 2>&1 &
          echo $! > kurrentdb.pid
          for i in {1..60}; do
            if curl -si http://127.0.0.1:2113/health/live | grep -q 'HTTP/1.1 204'; then
              echo "KurrentDB is ready after $((i-1)) seconds"
              exit 0
            fi
            sleep 1
          done
          echo "KurrentDB failed to start after 60 seconds"
          cat kurrentdb.log
          exit 1

      - name: Checkout KurrentDB repository
        uses: actions/checkout@v4
        with:
          repository: kurrent-io/KurrentDB
          ref: v26.0.2
          path: kurrentdb-repo

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -p:TreatWarningsAsErrors=false

      - name: Build project
        run: dotnet build --no-restore ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -p:TreatWarningsAsErrors=false

      - name: Run write flood (1 client)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 1 1000000 100000 256 1 test1-" | tee client_1.log

      - name: Run write flood (2 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 2 1000000 100000 256 1 test2-" | tee client_2.log

      - name: Run write flood (4 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 4 1000000 100000 256 1 test4-" | tee client_4.log

      - name: Run write flood (8 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 8 1000000 100000 256 1 test8-" | tee client_8.log

      - name: Run write flood (16 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 16 1000000 100000 256 1 test16-" | tee client_16.log

      - name: Run write flood (32 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 32 1000000 100000 256 1 test32-" | tee client_32.log

      - name: Generate plots
        run: python python/kurrentdb_testclient_plots.py client_*.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kurrentdb-testclient-results
          path: |
            client_*.log
            plots/*.png

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Python client
        run: make venv

      - name: Build kurrentdb-benchmark crate
        run: make kurrentdb-benchmark-rust-build

      - name: Benchmark official Rust client
        run: make kurrentdb-benchmark-rust-official

      - name: Benchmark minimal Rust client
        run: make kurrentdb-benchmark-rust-minimal

      - name: Benchmark Python client
        run: make kurrentdb-benchmark-python
