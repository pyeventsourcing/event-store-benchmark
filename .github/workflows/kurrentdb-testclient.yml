name: KurrentDB Test Client

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  write-flood:
    runs-on: ubuntu-latest
    steps:
      - name: Install and start kurrentdb
        run: |
          curl -1sLf 'https://packages.kurrent.io/public/kurrent-lts/setup.deb.sh' | sudo -E bash
          sudo apt-get install kurrentdb=26.0.2
          sudo cat /etc/kurrentdb/kurrentdb.conf
          sudo /usr/bin/kurrentd --insecure > kurrentdb.log 2>&1 &
          echo $! > kurrentdb.pid
          for i in {1..60}; do
            if curl -si http://127.0.0.1:2113/health/live | grep -q 'HTTP/1.1 204'; then
              echo "KurrentDB is ready after $((i-1)) seconds"
              exit 0
            fi
            sleep 1
          done
          echo "KurrentDB failed to start after 60 seconds"
          cat kurrentdb.log
          exit 1

      - name: Checkout KurrentDB repository
        uses: actions/checkout@v4
        with:
          repository: kurrent-io/KurrentDB
          ref: v26.0.2
          path: kurrentdb-repo

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj

      - name: Build project
        run: dotnet build --no-restore ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj

      - name: Run write flood (1 client)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 1 100000 10000 256 1 test1-"

      - name: Run write flood (2 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 2 100000 10000 256 1 test2-"

      - name: Run write flood (4 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 4 100000 10000 256 1 test4-"

      - name: Run write flood (8 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 8 100000 10000 256 1 test8-"

      - name: Run write flood (16 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 16 100000 10000 256 1 test16-"

      - name: Run write flood (32 clients)
        run: |
          dotnet run --project ./kurrentdb-repo/src/KurrentDB.TestClient/KurrentDB.TestClient.csproj -- \
           --command "WRFLGRPC 32 100000 10000 256 1 test32-"

      # WRFLGRPC [<CLIENTS> <REQUESTS> [<STREAMS-CNT> [<SIZE> [<BATCHSIZE> [<STREAM-PREFIX>]]]]]