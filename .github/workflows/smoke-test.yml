name: Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  run-smoke-test:
    runs-on: ubuntu-latest
    env:
      ESB_GIT_VERSION: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build benchmark tool
        run: make build

      - name: Run smoke-test workload  # sudo otherwise Axon Server files can't be deleted
        run: |
          sudo -E make run-smoke-test
          sudo chown -R $(id -u):$(id -g) ./results

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'python/requirements.txt'

      - name: Create Python virtual environment for reporting
        run: make venv

      - name: Generate report
        run: make report

      - name: Upload report artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-report
          path: results/
