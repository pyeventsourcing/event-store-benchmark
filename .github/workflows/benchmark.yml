  run-axonserver-local:
    needs: setup
    runs-on: ubuntu-latest
    env:
      ESB_SESSION_ID: ${{ needs.setup.outputs.session_id }}-AXN
    steps:
#      - name: Install axonserver (needs ubuntu 20.24 but we build es-bench for later glibc)
#        run: |
#          sudo apt install ca-certificates lsb-release curl
#          sudo curl https://pkg.axoniq.io/axoniq.pub -o /etc/apt/trusted.gpg.d/axoniq.asc
#          echo "deb [arch=all signed-by=/etc/apt/trusted.gpg.d/axoniq.asc] https://pkg.axoniq.io/apt $(. /etc/os-release && echo "$VERSION_CODENAME") main" | sudo tee /etc/apt/sources.list.d/axoniq.list > /dev/null
#          sudo apt-get update
#          sudo apt-get install axonserver

      - name: Install axonserver
        run: |
          curl -L https://download.axoniq.io/axonserver/AxonServer-2025.2.7.zip -o axonserver.zip
          unzip axonserver.zip

      - name: Start axonserver
        run: |
          cd AxonServer-2025.2.7
          AXONIQ_AXONSERVER_STANDALONE_DCB=true nohup java -jar axonserver.jar > axon.log 2>&1 &

      - name: Wait for Axon Server
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8024/actuator/health | grep -q '"status":"UP"'; then
              echo "Axon Server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Axon Server failed to start"
          cat AxonServer-2025.2.7/axon.log
          exit 1

      - name: Download benchmark tool
        uses: actions/download-artifact@v8
        with:
          name: es-bench
          path: target/release/

      - name: Download configs
        uses: actions/download-artifact@v8
        with:
          name: configs
          path: configs/

      - name: Download Makefile
        uses: actions/download-artifact@v8
        with:
          name: Makefile
          path: .

      - name: Make benchmark tool executable
        run: chmod +x target/release/es-bench

      - name: Run axonserver-local workload
        run: make run-axonserver-local

      - name: Upload axonserver-local results
        uses: actions/upload-artifact@v6
        with:
          name: results-axonserver-local
          path: results/raw/
          retention-days: 1

