  report:
#    needs: [run-smoke-test, run-scaling]
    needs: [run-smoke-test, run-umadb-local, run-kurrentdb-local, run-axonserver-local]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'python/requirements.txt'

      - name: Create Python virtual environment for reporting
        run: make venv

      - name: Download results
        uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: results/raw/
          merge-multiple: true

      - name: Generate report
        run: make report

      - name: Upload report artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-report
          path: results/published
