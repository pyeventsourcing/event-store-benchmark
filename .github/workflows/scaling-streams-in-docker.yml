name: Scaling Streams in Docker

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.session.outputs.session_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate Session ID
        id: session
        run: echo "session_id=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build benchmark tool
        run: make build

      - name: Upload benchmark tool
        uses: actions/upload-artifact@v6
        with:
          name: es-bench
          path: target/release/es-bench
          retention-days: 1

      - name: Upload configs
        uses: actions/upload-artifact@v6
        with:
          name: configs
          path: configs/
          retention-days: 1

      - name: Upload Makefile
        uses: actions/upload-artifact@v6
        with:
          name: Makefile
          path: Makefile
          retention-days: 1

  run-scaling-streams-in-docker:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        store: [umadb, kurrentdb, axonserver, eventsourcingdb, fact]
    env:
      ESB_SESSION_ID: ${{ needs.setup.outputs.session_id }}
      ESB_WORKLOAD_STORES: ${{ matrix.store }}
      ESB_GIT_VERSION: ${{ github.sha }}
    steps:
      - name: Download benchmark tool
        uses: actions/download-artifact@v8
        with:
          name: es-bench
          path: target/release/

      - name: Download configs
        uses: actions/download-artifact@v8
        with:
          name: configs
          path: configs/

      - name: Download Makefile
        uses: actions/download-artifact@v8
        with:
          name: Makefile
          path: .

      - name: Make benchmark tool executable
        run: chmod +x target/release/es-bench

      - name: Run scaling workload  # sudo otherwise Axon Server files can't be deleted
        run: |
          sudo -E make run-scaling-streams-in-docker
          sudo chown -R $(id -u):$(id -g) ./results

      - name: Upload scaling results
        uses: actions/upload-artifact@v6
        with:
          name: results-scaling-${{ matrix.store }}
          path: results/raw/
          retention-days: 1

  report:
    needs: [setup, run-scaling-streams-in-docker]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'python/requirements.txt'

      - name: Create Python virtual environment for reporting
        run: make venv

      - name: Download results
        uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: results/raw/
          merge-multiple: true

      - name: Generate report
        run: make report

      - name: Upload report artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-report
          path: results/published
